<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Copying a temporary email address</title>
  <desc id="desc">Screenshot-style image showing a copied temporary email address.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/><rect x="94" y="84" width="1012" height="552" rx="22" fill="#fff" stroke="#e2e8f0"/>
  <text x="600" y="190" text-anchor="middle" font-family="Arial" font-size="38" font-weight="700" fill="#1f2937">Copy the address before you leave</text>
  <rect x="250" y="270" width="700" height="78" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
  <text x="600" y="318" text-anchor="middle" font-family="Arial" font-size="25" fill="#111827">bright-river@offredaily.sa.com</text>
  <rect x="475" y="390" width="250" height="58" rx="12" fill="#16a34a"/><text x="600" y="427" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700" fill="#fff">Copied to clipboard</text>
  <text x="600" y="510" text-anchor="middle" font-family="Arial" font-size="17" fill="#64748b">Save it if the signup might take more than a few minutes.</text>
</svg>
