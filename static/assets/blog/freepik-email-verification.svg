  <rect width="1200" height="720" fill="#f4f7fb"/>
  <rect x="70" y="54" width="1060" height="612" rx="22" fill="#fff" stroke="#d8e0ea"/>
  <rect x="70" y="54" width="1060" height="82" rx="22" fill="#fff6ef"/>
  <text x="116" y="104" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ff6b35">FireTempMail</text>
  <rect x="114" y="170" width="972" height="72" rx="12" fill="#f8fafc" stroke="#dce3ec"/>
  <text x="144" y="214" font-family="Arial, sans-serif" font-size="21" fill="#1f2937">design-test@offredaily.sa.com</text>
  <rect x="936" y="186" width="112" height="40" rx="8" fill="#ff6b35"/>
  <text x="992" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Copy</text>
