<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Reading a verification code</title>
  <desc id="desc">Screenshot-style email body showing a verification code.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/><rect x="120" y="70" width="960" height="580" rx="22" fill="#fff" stroke="#e2e8f0"/>
  <text x="170" y="140" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Your verification code</text>
  <text x="170" y="190" font-family="Arial" font-size="17" fill="#64748b">Use this code to finish signup. It expires soon.</text>
  <rect x="310" y="270" width="580" height="150" rx="18" fill="#ecfdf5" stroke="#86efac"/>
  <text x="600" y="365" text-anchor="middle" font-family="Arial" font-size="58" font-weight="700" letter-spacing="8" fill="#166534">482913</text>
  <text x="600" y="500" text-anchor="middle" font-family="Arial" font-size="17" fill="#64748b">Copy the code, verify the account, then decide whether this account needs permanent email.</text>
</svg>
